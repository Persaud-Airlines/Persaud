<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persaud Airlines | Elite Private Charter</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <style>
        /* ... (Keep all existing CSS from previous version) ... */
        /* Optimization: ensure video doesn't flicker during scroll */
        #charter-video {
            will-change: transform;
            backface-visibility: hidden;
        }
    </style>
</head>
<body>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            gsap.registerPlugin(ScrollTrigger);

            const video = document.getElementById("charter-video");
            
            // Critical: Ensure video is ready to seek
            video.pause();
            video.currentTime = 0;

            const initScrollTimeline = () => {
                const tl = gsap.timeline({
                    scrollTrigger: {
                        trigger: "#video-container",
                        start: "top top",
                        end: "+=5000",
                        scrub: 0.5, // Increased from 0.2 to 0.5 for smoother easing
                        pin: true,
                        anticipatePin: 1, // Fixes the "jumpy" feeling when pinning starts
                        invalidateOnRefresh: true
                    }
                });

                tl.to(video, { currentTime: video.duration || 10, ease: "none", duration: 10.5 }, 0);
                
                // ... (Keep existing Stage transitions)
            };

            // Failsafe initialization
            if (video.readyState >= 3) { // Use HAVE_FUTURE_DATA
                initScrollTimeline();
            } else {
                video.addEventListener("loadedmetadata", initScrollTimeline);
            }
        });
    </script>
    
    </body>
</html>
